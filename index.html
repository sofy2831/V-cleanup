  <style>
    :root{
      --violet:#7A5CFF;
      --violet-dark:#5E39FF;
      --bg:#F8F7FF;
      --card:#FFFFFF;
      --text:#111111;
      --muted:#62697A;
      --border:rgba(122,92,255,.16);
      --shadow:0 16px 40px rgba(49,33,110,.08);
      --shadow-strong:0 24px 60px rgba(48,30,118,.14);
      --radius:22px;
    }

    *{ box-sizing:border-box; }

    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    img{
      max-width:100%;
      display:block;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font-family:inherit;
    }

    .container{
      width:100%;
      max-width:1180px;
      margin:0 auto;
      padding:0 20px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      backdrop-filter:blur(10px);
      background:rgba(248,247,255,.88);
      border-bottom:1px solid rgba(122,92,255,.08);
    }

    .topbar-inner{
      min-height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:28px;
      font-weight:900;
      font-size:28px;
    }

    .brand-badge{
      width:150px;
      height:80px;
      border-radius:28px;
      background:#fff;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex-shrink:0;
      padding:6px;
    }

    .brand-badge img{
      width:88px;
      height:88px;
      object-fit:contain;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .nav-link{
      font-size:14px;
      font-weight:800;
      color:#4D5260;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:50px;
      padding:0 18px;
      border-radius:15px;
      font-size:14px;
      font-weight:800;
      border:1px solid transparent;
      transition:.18s ease;
      cursor:pointer;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      color:#fff;
      background:linear-gradient(135deg,var(--violet),var(--violet-dark));
      box-shadow:0 14px 28px rgba(94,57,255,.22);
    }

    .btn-secondary{
      background:#fff;
      color:var(--violet-dark);
      border-color:var(--border);
      box-shadow:var(--shadow);
    }

    .hero{
      padding:54px 0 24px;
    }

    .hero-wrap{
      display:grid;
      grid-template-columns:1.02fr .98fr;
      gap:30px;
      align-items:center;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 13px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--border);
      font-size:12px;
      font-weight:900;
      color:#5B45C8;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    h1{
      margin:0 0 16px;
      font-size:54px;
      line-height:1.02;
      letter-spacing:-1.6px;
    }

    .hero p{
      margin:0;
      max-width:700px;
      font-size:18px;
      line-height:1.65;
      color:var(--muted);
    }

    .hero-visual{
      background:linear-gradient(180deg,#FFFFFF 0%, #F4EEFF 100%);
      border:1px solid var(--border);
      border-radius:30px;
      box-shadow:var(--shadow-strong);
      padding:18px;
    }

    .hero-visual img{
      width:100%;
      border-radius:20px;
      border:1px solid rgba(122,92,255,.10);
      background:#fff;
    }

    .section{
      padding:38px 0;
    }

    .section-head{
      max-width:760px;
      margin-bottom:24px;
    }

    .section-head h2{
      margin:0 0 10px;
      font-size:35px;
      line-height:1.08;
      letter-spacing:-.9px;
    }

    .section-head p{
      margin:0;
      font-size:16px;
      line-height:1.65;
      color:var(--muted);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:18px;
    }

    .stat-card,
    .card,
    .shot-card,
    .price-card,
    .faq-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .stat-card{
      padding:22px;
    }

    .stat-big{
      font-size:32px;
      font-weight:900;
      line-height:1;
      color:var(--violet-dark);
      margin-bottom:8px;
    }

    .stat-card p{
      margin:0;
      font-size:14px;
      color:var(--muted);
      line-height:1.55;
    }

    .feature-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:18px;
    }

    .card{
      padding:22px;
    }

    .card h3{
      margin:0 0 10px;
      font-size:17px;
      font-weight:900;
    }

    .card p{
      margin:0;
      font-size:14px;
      color:var(--muted);
      line-height:1.6;
    }

    .screens-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:18px;
    }

    .shot-card{
      overflow:hidden;
    }

    .shot-button{
      display:block;
      width:100%;
      border:none;
      padding:0;
      margin:0;
      background:transparent;
      cursor:pointer;
      text-align:left;
    }

    .shot-button img{
      width:100%;
      aspect-ratio:16/11;
      object-fit:cover;
      background:#fff;
      transition:transform .2s ease;
    }

    .shot-button:hover img{
      transform:scale(1.02);
    }

    .shot-body{
      padding:16px 16px 18px;
    }

    .shot-body h3{
      margin:0 0 8px;
      font-size:16px;
      font-weight:900;
    }

    .shot-body p{
      margin:0;
      font-size:14px;
      color:var(--muted);
      line-height:1.55;
    }

    .pricing{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:18px;
      align-items:stretch;
    }

    .price-card{
      padding:22px;
      display:flex;
      flex-direction:column;
      gap:12px;
      position:relative;
    }

    .price-card.featured{
      border:2px solid rgba(122,92,255,.48);
      box-shadow:0 22px 50px rgba(94,57,255,.16);
      transform:translateY(-2px);
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      background:#fff5da;
      color:#6C4300;
      border:1px solid rgba(255,200,90,.45);
      width:max-content;
    }

    .price-name{
      margin:0;
      font-size:21px;
      font-weight:900;
    }

    .price-range{
      margin:0;
      font-size:14px;
      color:var(--muted);
    }

    .price-value{
      margin:2px 0 0;
      font-size:34px;
      line-height:1;
      font-weight:900;
      color:var(--violet-dark);
    }

    .price-value small{
      font-size:14px;
      font-weight:800;
      color:var(--muted);
    }

    .price-list{
      margin:0;
      padding-left:18px;
      flex:1;
      color:#333;
    }

    .price-list li{
      margin:8px 0;
      font-size:14px;
      line-height:1.5;
    }

    .faq{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
    }

    .faq-card{
      padding:20px;
    }

    .faq-card h3{
      margin:0 0 10px;
      font-size:16px;
      font-weight:900;
    }

    .faq-card p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    .cta-final{
      margin-top:18px;
      border-radius:30px;
      padding:42px 28px;
      background:linear-gradient(135deg,var(--violet),var(--violet-dark));
      color:#fff;
      text-align:center;
      box-shadow:0 26px 54px rgba(94,57,255,.22);
    }

    .cta-final h2{
      margin:0 0 10px;
      font-size:34px;
      line-height:1.08;
    }

    .cta-final p{
      margin:0 auto 20px;
      max-width:760px;
      color:rgba(255,255,255,.90);
      font-size:16px;
      line-height:1.65;
    }

    .cta-final .btn-primary{
      background:#fff;
      color:var(--violet-dark);
      box-shadow:0 12px 24px rgba(0,0,0,.16);
    }

    footer{
      padding:34px 0 46px;
    }

    .footer-wrap{
      border-top:1px solid rgba(122,92,255,.10);
      padding-top:20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      color:#676B76;
      font-size:14px;
    }

    .footer-brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
    }

    .footer-brand img{
      width:34px;
      height:34px;
      object-fit:contain;
    }

    .lightbox{
      position:fixed;
      inset:0;
      background:rgba(15,12,30,.82);
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      z-index:9999;
    }

    .lightbox.open{
      display:flex;
    }

    .lightbox-inner{
      position:relative;
      max-width:1100px;
      width:100%;
    }

    .lightbox-close{
      position:absolute;
      top:-14px;
      right:-4px;
      width:44px;
      height:44px;
      border:none;
      border-radius:999px;
      background:#fff;
      color:#111;
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .lightbox img{
      width:100%;
      max-height:86vh;
      object-fit:contain;
      border-radius:20px;
      background:#fff;
      box-shadow:var(--shadow-strong);
    }

    @media (max-width:1400px){
      .hero-wrap,
      .feature-grid,
      .pricing,
      .screens-grid,
      .faq,
      .stats{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width:860px){
      .topbar-inner{
        align-items:flex-start;
        padding:12px 0;
      }

      .nav{
        justify-content:flex-end;
      }

      .hero{
        padding-top:34px;
      }

      h1{
        font-size:38px;
        letter-spacing:-1px;
      }

      .hero p{
        font-size:16px;
      }

      .hero-wrap,
      .feature-grid,
      .pricing,
      .screens-grid,
      .faq,
      .stats{
        grid-template-columns:1fr;
      }

      .section-head h2,
      .cta-final h2{
        font-size:28px;
      }

      .price-value{
        font-size:30px;
      }

      .brand{
        font-size:16px;
        gap:12px;
      }

      .brand-badge{
        width:96px;
        height:64px;
        border-radius:20px;
  padding:4px;
      }

      .brand-badge img{
        width:78px;
        height:78px;
        object-fit:contain;
      }
    }
  </style>

</head>
<body>

  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="#top" aria-label="Accueil CleanUp Manager">
        <span class="brand-badge">
          <img src="./image/logo.png" alt="Logo CleanUp Manager">
        </span>
        <span>CleanUp Manager</span>
      </a>

      <nav class="nav" aria-label="Navigation principale">
        <a class="nav-link" href="#fonctionnalites">Fonctionnalités</a>
        <a class="nav-link" href="#captures">Captures</a>
        <a class="nav-link" href="#tarifs">Tarifs</a>
        <a class="nav-link" href="#faq">FAQ</a>
        <a class="btn btn-primary" href="https://cleanup-manager.fr/">Créer mon compte gratuit</a>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="container hero-wrap">
        <div>
          <div class="eyebrow">Logiciel de conciergerie • location courte durée • multi-plateformes</div>

          <h1>Le logiciel de conciergerie pour piloter planning, agents, photos et facturation</h1>

          <p>
            CleanUp Manager aide les conciergeries et gestionnaires de locations courte durée
            à centraliser logements, réservations, interventions, preuves photos, devis et factures
            dans un seul outil. Compatible avec une activité issue d’Airbnb, Booking.com, Abritel et autres plateformes.
          </p>
        </div>

        <div class="hero-visual">
          <img src="./image/tableau-de-bord.png" alt="Tableau de bord CleanUp Manager pour conciergerie">
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="stats">
          <article class="stat-card">
            <div class="stat-big">1 seul outil</div>
            <p>Planning, production, agents, photos, devis, factures et suivi propriétaire.</p>
          </article>
          <article class="stat-card">
            <div class="stat-big">0 commission</div>
            <p>Vous gardez vos revenus. CleanUp Manager fonctionne à l’abonnement.</p>
          </article>
          <article class="stat-card">
            <div class="stat-big">Interface métier</div>
            <p>Conçue pour une vraie conciergerie terrain, pas pour faire joli en démo.</p>
          </article>
        </div>
      </div>
    </section>

    <section class="section" id="fonctionnalites">
      <div class="container">
        <div class="section-head">
          <h2>Les fonctions utiles, pas du décor</h2>
          <p>
            Le cœur du logiciel : gérer une conciergerie sans bricoler entre Excel, messages et mémoire humaine.
          </p>
        </div>

        <div class="feature-grid">
          <article class="card">
            <h3>Planning conciergerie</h3>
            <p>Réservations, arrivées, départs, logements et prestations au même endroit.</p>
          </article>
          <article class="card">
            <h3>Interventions & agents</h3>
            <p>Affectation des missions, statuts, validations et suivi terrain.</p>
          </article>
          <article class="card">
            <h3>Preuves photos</h3>
            <p>Photos centralisées pour limiter les contestations et les flous.</p>
          </article>
          <article class="card">
            <h3>Comptabilité simple</h3>
            <p>Devis, factures, règlements et suivi commercial sans sortir du logiciel.</p>
          </article>
        </div>
      </div>
    </section>

    <section class="section" id="captures">
      <div class="container">
        <div class="section-head">
          <h2>Le logiciel en images</h2>
          <p>
            Clique sur une capture pour l’ouvrir en grand. Là au moins, on voit vraiment l’outil.
          </p>
        </div>

        <div class="screens-grid">
          <article class="shot-card">
            <button class="shot-button" type="button" data-full="./image/tableau-de-bord.png" data-alt="Tableau de bord du logiciel de conciergerie CleanUp Manager">
              <img src="./image/tableau-de-bord.png" alt="Tableau de bord du logiciel de conciergerie CleanUp Manager">
            </button>
            <div class="shot-body">
              <h3>Tableau de bord</h3>
              <p>Vue d’ensemble rapide sur l’activité, les blocs métiers et les actions utiles.</p>
            </div>
          </article>

          <article class="shot-card">
            <button class="shot-button" type="button" data-full="./image/planning.png" data-alt="Planning des logements et interventions sur CleanUp Manager">
              <img src="./image/planning.png" alt="Planning des logements et interventions sur CleanUp Manager">
            </button>
            <div class="shot-body">
              <h3>Planning</h3>
              <p>Visualisation claire des réservations, départs, arrivées et prestations à déclencher.</p>
            </div>
          </article>

          <article class="shot-card">
            <button class="shot-button" type="button" data-full="./image/agent.png" data-alt="Gestion des agents et interventions sur CleanUp Manager">
              <img src="./image/agent.png" alt="Gestion des agents et interventions sur CleanUp Manager">
            </button>
            <div class="shot-body">
              <h3>Agents & production</h3>
              <p>Attribution des missions, suivi des tâches et validation terrain.</p>
            </div>
          </article>

          <article class="shot-card">
            <button class="shot-button" type="button" data-full="./image/comptabilite.png" data-alt="Module comptabilité devis factures sur CleanUp Manager">
              <img src="./image/comptabilite.png" alt="Module comptabilité devis factures sur CleanUp Manager">
            </button>
            <div class="shot-body">
              <h3>Comptabilité</h3>
              <p>Documents commerciaux et logique de suivi plus propre pour la conciergerie.</p>
            </div>
          </article>

          <article class="shot-card">
            <button class="shot-button" type="button" data-full="./image/proprietaire.png" data-alt="Espace propriétaire dans CleanUp Manager">
              <img src="./image/proprietaire.png" alt="Espace propriétaire dans CleanUp Manager">
            </button>
            <div class="shot-body">
              <h3>Espace propriétaire</h3>
              <p>Une relation plus cadrée avec le propriétaire, sans échange dispersé.</p>
            </div>
          </article>

          <article class="shot-card">
            <button class="shot-button" type="button" data-full="./image/tarifs.png" data-alt="Tarifs du logiciel de conciergerie CleanUp Manager">
              <img src="./image/tarifs.png" alt="Tarifs du logiciel de conciergerie CleanUp Manager">
            </button>
            <div class="shot-body">
              <h3>Tarifs</h3>
              <p>Une logique simple : abonnement mensuel, pas de commission sur l’activité.</p>
            </div>
          </article>
        </div>
      </div>
    </section>

    <section class="section" id="tarifs">
      <div class="container">
        <div class="section-head">
          <h2>Tarifs</h2>
          <p>Des plans simples selon le nombre de logements gérés.</p>
        </div>

        <div class="pricing">
          <article class="price-card">
            <p class="price-name">Gratuit</p>
            <p class="price-range">0 à 2 logements</p>
            <div class="price-value">0€ <small>/ mois</small></div>
            <ul class="price-list">
              <li>Pour démarrer</li>
              <li>Base de gestion conciergerie</li>
              <li>Idéal pour tester l’outil</li>
            </ul>
            <a class="btn btn-secondary" href="https://cleanup-manager.fr/">Commencer</a>
          </article>

          <article class="price-card">
            <p class="price-name">Starter</p>
            <p class="price-range">3 à 5 logements</p>
            <div class="price-value">49,90€ <small>/ mois</small></div>
            <ul class="price-list">
              <li>Planning</li>
              <li>Interventions & agents</li>
              <li>Base de facturation</li>
            </ul>
            <a class="btn btn-secondary" href="https://cleanup-manager.fr/">Choisir Starter</a>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lightboxClose" aria-label="Fermer">×</button>
      <img id="lightboxImage" src="" alt="">
    </div>
  </div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxClose = document.getElementById('lightboxClose');
    const shotButtons = document.querySelectorAll('.shot-button');

    shotButtons.forEach(button => {
      button.addEventListener('click', () => {
        const full = button.getAttribute('data-full');
        const alt = button.getAttribute('data-alt') || '';
        lightboxImage.src = full;
        lightboxImage.alt = alt;
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
      lightboxImage.alt = '';
      document.body.style.overflow = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('open')) {
        closeLightbox();
      }
    });
  </script>
